name: ✅ Version Compatibility Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  version-compatibility:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create .env for CI
        run: |
          cat > .env << EOF
          ADMIN_PASSWORD=Ci1placeholder
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=yaktest
          POSTGRES_PORT=5432
          POSTGRES_DATASET=/tmp/pgdata
          JWT_SECRET_KEY=Ci1placeholder
          JWT_REFRESH_SECRET_KEY=Ci1placeholder
          EOF

      - name: Start full stack
        run: docker compose up -d --wait

      - name: Get generatedFromApiSchemaHash from yak-display /frontend-meta
        id: frontend_meta
        run: |
          response=$(curl -s http://localhost:3000/frontend-meta)
          echo "frontend_schema_hash=$(echo "$response" | jq -r '.generatedFromApiSchemaHash')" >> "$GITHUB_OUTPUT"

      - name: Get schema hash from yak-server /api/version
        id: backend_version
        run: |
          response=$(curl -s http://localhost:3000/api/version)
          echo "backend_schema_hash=$(echo "$response" | jq -r '.result.schema_hash')" >> "$GITHUB_OUTPUT"

      - name: Assert compatibility
        run: |
          required="${{ steps.frontend_meta.outputs.frontend_schema_hash }}"
          actual="${{ steps.backend_version.outputs.backend_schema_hash }}"
          echo "yak-display was built against backend: $required"
          echo "yak-server version:                    $actual"
          if [ "$required" != "$actual" ]; then
            echo "::error::Incompatible versions — yak-display requires backend $required but yak-server is $actual"
            exit 1
          fi
          echo "Versions are compatible."

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
