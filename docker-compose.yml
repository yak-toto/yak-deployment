services:
  postgres:
    image: postgres:18.3-alpine3.22
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${POSTGRES_DATASET}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  yak-server:
    image: ghcr.io/yak-toto/yak-server:0.74.0-world_cup_2026
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  yak-display:
    image: ghcr.io/yak-toto/yak-display:0.14.2
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      yak-server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  caddy:
    image: caddy:2.11.2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      yak-display:
        condition: service_started

volumes:
  caddy_data:
  caddy_config:
