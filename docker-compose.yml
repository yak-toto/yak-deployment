services:
  postgres:
    image: postgres:18.3-alpine3.22
    container_name: yak-db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${POSTGRES_DATASET}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  yak-server:
    image: ghcr.io/yak-toto/yak-server:0.80.1-world_cup_2026
    container_name: yak-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/api/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  yak-display:
    image: ghcr.io/yak-toto/yak-display:0.16.1
    container_name: yak-display
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 3000:80
    depends_on:
      yak-server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
